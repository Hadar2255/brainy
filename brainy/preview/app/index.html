<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Brainy</title>
    <base id="app-base" href="./">
    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      (function () {
        // 1. Capture the current path of the page (the directory the app lives in).
        var p = window.location.pathname;
        var dir = p.indexOf('.html') > 0 ? p.replace(/[^/]+\.html$/, '') : p;
        if (!dir.endsWith('/')) dir += '/';
        // 2. Pin <base> to that directory so relative URLs (assets) still resolve.
        document.getElementById('app-base').href = dir;
        // 3. Now spoof the URL to "/" so Expo Router treats this as the root SPA.
        try { history.replaceState({}, '', '/'); } catch (e) {}
        // 4. Inject the bundle dynamically — now that the URL is /, expo-router
        //    will match it to index.tsx instead of returning "Unmatched Route".
        var s = document.createElement('script');
        s.src = '_expo/static/js/web/entry-8e08d995d472d211ee036b6b331f103b.js';
        s.defer = true;
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
