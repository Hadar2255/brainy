<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brainy / מוחי – Mockup Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap">
  <link rel="stylesheet" href="assets/css/design-tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family-he);
      background: linear-gradient(135deg, #EEF2FF 0%, #FAE8FF 100%);
      min-height: 100vh;
      color: var(--color-text-primary);
      padding: 32px 16px;
    }
    .gallery-header {
      max-width: 1200px;
      margin: 0 auto 32px;
      text-align: center;
    }
    .gallery-header h1 {
      font-size: 40px;
      font-weight: 900;
      color: var(--color-primary);
      margin-bottom: 8px;
    }
    .gallery-header p {
      color: var(--color-text-secondary);
      font-size: 16px;
      max-width: 640px;
      margin: 0 auto;
      line-height: 1.6;
    }
    .toolbar {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }
    .lang-toggle {
      display: inline-flex;
      background: white;
      border: 2px solid var(--color-border);
      border-radius: 9999px;
      padding: 4px;
      gap: 4px;
    }
    .lang-toggle button {
      border: none;
      background: transparent;
      padding: 8px 20px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      color: var(--color-text-muted);
    }
    .lang-toggle button.active {
      background: var(--color-primary);
      color: white;
    }
    .gallery-grid {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .mockup-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      border: 2px solid var(--color-border);
    }
    .mockup-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 32px rgba(124, 58, 237, 0.18);
      border-color: var(--color-primary-light);
    }

    /* Phone preview (visual mock, not an iframe) */
    .phone-preview {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      background: linear-gradient(135deg, var(--gradient-from, #EEF2FF), var(--gradient-to, #FAE8FF));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .phone-mini {
      width: 65%;
      aspect-ratio: 9 / 19;
      background: var(--screen-bg, white);
      border-radius: 18px;
      box-shadow:
        0 0 0 4px #1F2937,
        0 0 0 6px #374151,
        0 10px 28px rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .phone-mini::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 35%;
      height: 5px;
      background: #1F2937;
      border-radius: 4px;
    }
    .mini-status {
      height: 14px;
      flex-shrink: 0;
    }
    .mini-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 4px;
      color: var(--screen-fg, var(--color-text-primary));
      font-size: 9px;
      font-weight: 800;
      text-align: center;
    }
    .mini-icon {
      font-size: 32px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .mini-label {
      font-size: 9px;
      opacity: 0.9;
      font-weight: 700;
      padding: 0 4px;
    }
    .mini-shapes {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }
    .mini-shape {
      width: 14px;
      height: 4px;
      border-radius: 2px;
      background: currentColor;
      opacity: 0.3;
    }
    .mini-shape:nth-child(1) { width: 24px; opacity: 0.6; }

    /* Color variants */
    .preview-primary { --gradient-from: #DDD6FE; --gradient-to: #C4B5FD; }
    .preview-secondary { --gradient-from: #FEF3C7; --gradient-to: #FCD34D; }
    .preview-success { --gradient-from: #D1FAE5; --gradient-to: #A7F3D0; }
    .preview-info { --gradient-from: #DBEAFE; --gradient-to: #93C5FD; }
    .preview-pink { --gradient-from: #FAE8FF; --gradient-to: #F0ABFC; }
    .preview-orange { --gradient-from: #FFEDD5; --gradient-to: #FED7AA; }
    .preview-purple { --screen-bg: #7C3AED; --screen-fg: white; }
    .preview-green { --screen-bg: #10B981; --screen-fg: white; }
    .preview-darkpurple { --screen-bg: linear-gradient(135deg, #A78BFA 0%, #7C3AED 100%); --screen-fg: white; }

    .mockup-info {
      padding: 16px 20px;
      border-top: 2px solid var(--color-border);
    }
    .mockup-number {
      display: inline-block;
      font-size: 11px;
      font-weight: 800;
      color: var(--color-primary);
      background: #F5F3FF;
      padding: 3px 10px;
      border-radius: 9999px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .mockup-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .mockup-desc {
      font-size: 13px;
      color: var(--color-text-muted);
      line-height: 1.5;
    }
    .open-arrow {
      font-size: 18px;
      color: var(--color-primary);
      font-weight: 800;
      margin-top: 8px;
    }
    .gallery-footer {
      max-width: 1200px;
      margin: 48px auto 0;
      text-align: center;
      padding: 24px;
      color: var(--color-text-muted);
      font-size: 13px;
    }
    .gallery-footer code {
      background: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid var(--color-border);
    }
    .gallery-footer .links {
      margin-top: 12px;
    }
    .gallery-footer a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 700;
      margin: 0 8px;
    }
  </style>
</head>
<body>
  <header class="gallery-header">
    <h1 id="title">🦉 מוחי – גלריית מסכים</h1>
    <p id="subtitle">אפליקציית זיכרון בסגנון דולינגו עם 7 שיטות מוכחות. 14 מסכים אינטראקטיביים - לחץ על מסך כדי לפתוח אותו במלוא הגודל.</p>
    <div class="toolbar">
      <div class="lang-toggle">
        <button class="active" onclick="switchLang('he')">עברית</button>
        <button onclick="switchLang('en')">English</button>
      </div>
    </div>
  </header>

  <div class="gallery-grid" id="grid"></div>

  <footer class="gallery-footer">
    <p id="footer-text">שלב 1 – Mockups | שלב 2 (עתידי): <code>React Native + Expo</code></p>
    <div class="links">
      <a href="../docs/memory-methods.md" id="docs-link">📚 שיטות הזיכרון</a>
      <a href="../README.md" id="readme-link">📖 README</a>
    </div>
  </footer>

  <script>
    const SCREENS = [
      { n: 1, file: '01-splash.html', cls: 'preview-darkpurple', icon: '🦉', he: { t: 'מסך פתיחה', d: 'לוגו ותנשמת עם אנימציה' }, en: { t: 'Splash', d: 'Logo and animated owl' } },
      { n: 2, file: '02-onboarding.html', cls: 'preview-pink', icon: '👋', he: { t: 'אונבורדינג', d: '3 שקופיות הסבר' }, en: { t: 'Onboarding', d: '3 intro slides' } },
      { n: 3, file: '03-language.html', cls: 'preview-info', icon: '🌐', he: { t: 'בחירת שפה', d: 'עברית או אנגלית' }, en: { t: 'Language', d: 'Hebrew or English' } },
      { n: 4, file: '04-signup.html', cls: 'preview-secondary', icon: '🎯', he: { t: 'יעד יומי', d: 'בחירת זמן תרגול יומי' }, en: { t: 'Daily Goal', d: 'Daily practice time' } },
      { n: 5, file: '05-home.html', cls: 'preview-primary', icon: '🏠', he: { t: 'מסך בית', d: 'Skill Tree של שיטות הזיכרון' }, en: { t: 'Home', d: 'Skill tree of techniques' } },
      { n: 6, file: '06-lesson-intro.html', cls: 'preview-darkpurple', icon: '📖', he: { t: 'פתיחת שיעור', d: 'מבוא לשיטה חדשה' }, en: { t: 'Lesson Intro', d: 'Intro to a new method' } },
      { n: 7, file: '07-lesson-teach.html', cls: 'preview-primary', icon: '💡', he: { t: 'שיעור הוראה', d: 'הסבר על השיטה' }, en: { t: 'Teach', d: 'Method explanation' } },
      { n: 8, file: '08-quiz.html', cls: 'preview-pink', icon: '❓', he: { t: 'תרגיל בחירה', d: 'שאלת רב-ברירה' }, en: { t: 'Quiz', d: 'Multiple choice' } },
      { n: 9, file: '09-quiz-match.html', cls: 'preview-success', icon: '🔗', he: { t: 'תרגיל התאמה', d: 'התאמת זוגות' }, en: { t: 'Match', d: 'Pair matching' } },
      { n: 10, file: '10-quiz-recall.html', cls: 'preview-orange', icon: '✏️', he: { t: 'תרגיל היזכרות', d: 'הקלדת תשובה חופשית' }, en: { t: 'Recall', d: 'Free-text recall' } },
      { n: 11, file: '11-lesson-complete.html', cls: 'preview-green', icon: '🎉', he: { t: 'סיום שיעור', d: 'XP, רצף וקונפטי' }, en: { t: 'Complete', d: 'XP, streak, confetti' } },
      { n: 12, file: '12-profile.html', cls: 'preview-primary', icon: '👤', he: { t: 'פרופיל', d: 'אווטר והישגים' }, en: { t: 'Profile', d: 'Avatar and achievements' } },
      { n: 13, file: '13-progress.html', cls: 'preview-secondary', icon: '📊', he: { t: 'התקדמות', d: 'סטטיסטיקות וגרפים' }, en: { t: 'Progress', d: 'Stats and charts' } },
      { n: 14, file: '14-settings.html', cls: 'preview-info', icon: '⚙️', he: { t: 'הגדרות', d: 'שפה, מצב כהה, התראות' }, en: { t: 'Settings', d: 'Language, dark mode, notifications' } }
    ];

    const STORAGE_KEY = 'memory_app_lang';
    let currentLang = localStorage.getItem(STORAGE_KEY) || 'he';

    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      SCREENS.forEach((s) => {
        const info = s[currentLang];
        const card = document.createElement('a');
        card.className = 'mockup-card';
        card.href = `screens/${s.file}`;
        const isDarkScreen = s.cls.includes('purple') || s.cls.includes('green') || s.cls.includes('darkpurple');
        card.innerHTML = `
          <div class="phone-preview ${s.cls}">
            <div class="phone-mini">
              <div class="mini-status"></div>
              <div class="mini-content">
                <div class="mini-icon">${s.icon}</div>
                <div class="mini-label">${info.t}</div>
                <div class="mini-shapes">
                  <div class="mini-shape"></div>
                  <div class="mini-shape"></div>
                  <div class="mini-shape"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="mockup-info">
            <span class="mockup-number">${currentLang === 'he' ? 'מסך' : 'SCREEN'} ${String(s.n).padStart(2, '0')}</span>
            <div class="mockup-title">${info.t}</div>
            <div class="mockup-desc">${info.d}</div>
            <div class="open-arrow">${currentLang === 'he' ? 'פתח ←' : '→ Open'}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function switchLang(lang) {
      currentLang = lang;
      localStorage.setItem(STORAGE_KEY, lang);
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
      document.body.style.fontFamily = lang === 'he' ? 'var(--font-family-he)' : 'var(--font-family-en)';
      document.getElementById('title').textContent = lang === 'he' ? '🧠 מוחי – גלריית מסכים' : '🧠 Brainy – Mockup Gallery';
      document.getElementById('subtitle').textContent = lang === 'he'
        ? 'אפליקציית זיכרון בסגנון דולינגו לפי שיטות ג\'ים קוויק. 14 מסכים אינטראקטיביים - לחץ על מסך כדי לפתוח אותו במלוא הגודל.'
        : 'Duolingo-style memory app with 7 proven techniques. 14 interactive screens — click any to open it full-size.';
      document.getElementById('footer-text').innerHTML = lang === 'he'
        ? 'שלב 1 – Mockups | שלב 2 (עתידי): <code>React Native + Expo</code>'
        : 'Phase 1 – Mockups | Phase 2 (future): <code>React Native + Expo</code>';
      document.getElementById('docs-link').textContent = lang === 'he' ? '📚 שיטות הזיכרון' : '📚 Memory Methods';
      document.getElementById('readme-link').textContent = lang === 'he' ? '📖 README' : '📖 README';
      document.querySelectorAll('.lang-toggle button').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && lang === 'he') || (i === 1 && lang === 'en'));
      });
      render();
    }

    // Apply persisted language on first load
    document.documentElement.setAttribute('lang', currentLang);
    document.documentElement.setAttribute('dir', currentLang === 'he' ? 'rtl' : 'ltr');
    if (currentLang === 'en') switchLang('en');
    else render();
  </script>
</body>
</html>
