    <line x1="10" y1="32" x2="22" y2="32"/>
    <line x1="14" y1="44" x2="24" y2="44"/>
    <line x1="56" y1="56" x2="66" y2="56"/>
    <line x1="58" y1="68" x2="68" y2="68"/>
