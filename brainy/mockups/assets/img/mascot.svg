<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="240" height="280" role="img" aria-label="Hoot the owl mascot">
  <defs>
    <linearGradient id="bodyGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bodyGradShade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="100%" stop-color="#5B21B6" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="bellyGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="beakGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FB7185" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#FB7185" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FB7185" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#FBBF24" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Soft ground shadow -->
  <ellipse cx="120" cy="265" rx="58" ry="6" fill="#1F2937" opacity="0.12"/>

  <!-- Tail feathers (behind body) -->
  <path d="M 82 230 Q 78 250 92 252 Q 100 248 96 232 Z" fill="#5B21B6"/>
  <path d="M 158 230 Q 162 250 148 252 Q 140 248 144 232 Z" fill="#5B21B6"/>
  <path d="M 120 240 Q 113 258 120 260 Q 127 258 120 240 Z" fill="#6D28D9"/>

  <!-- Feet -->
  <g>
    <ellipse cx="98" cy="248" rx="11" ry="6" fill="url(#beakGrad)"/>
    <ellipse cx="142" cy="248" rx="11" ry="6" fill="url(#beakGrad)"/>
    <!-- Tiny toes -->
    <circle cx="92" cy="250" r="2.5" fill="#92400E"/>
    <circle cx="98" cy="252" r="2.5" fill="#92400E"/>
    <circle cx="104" cy="250" r="2.5" fill="#92400E"/>
    <circle cx="136" cy="250" r="2.5" fill="#92400E"/>
    <circle cx="142" cy="252" r="2.5" fill="#92400E"/>
    <circle cx="148" cy="250" r="2.5" fill="#92400E"/>
  </g>

  <!-- Body main shape - rounded teardrop -->
  <ellipse cx="120" cy="170" rx="68" ry="78" fill="url(#bodyGrad)"/>
  <ellipse cx="120" cy="170" rx="68" ry="78" fill="url(#bodyGradShade)"/>

  <!-- Wing feather detail (subtle scallops) -->
  <g opacity="0.35" fill="#5B21B6">
    <path d="M 64 160 Q 75 165 70 175 Q 60 168 64 160 Z"/>
    <path d="M 60 180 Q 72 184 67 196 Q 56 188 60 180 Z"/>
    <path d="M 62 202 Q 73 204 70 215 Q 58 209 62 202 Z"/>
    <path d="M 176 160 Q 165 165 170 175 Q 180 168 176 160 Z"/>
    <path d="M 180 180 Q 168 184 173 196 Q 184 188 180 180 Z"/>
    <path d="M 178 202 Q 167 204 170 215 Q 182 209 178 202 Z"/>
  </g>

  <!-- Belly patch (cream white) -->
  <path d="M 120 145 C 95 145 84 168 86 200 C 88 225 105 235 120 235 C 135 235 152 225 154 200 C 156 168 145 145 120 145 Z" fill="url(#bellyGrad)"/>

  <!-- Wings (slightly raised, hugging body) -->
  <path d="M 56 158 Q 42 168 48 200 Q 55 222 70 218 Q 78 200 75 175 Q 70 155 56 158 Z" fill="url(#bodyGrad)"/>
  <path d="M 56 158 Q 42 168 48 200 Q 55 222 70 218 Q 78 200 75 175 Q 70 155 56 158 Z" fill="url(#bodyGradShade)"/>
  <path d="M 184 158 Q 198 168 192 200 Q 185 222 170 218 Q 162 200 165 175 Q 170 155 184 158 Z" fill="url(#bodyGrad)"/>
  <path d="M 184 158 Q 198 168 192 200 Q 185 222 170 218 Q 162 200 165 175 Q 170 155 184 158 Z" fill="url(#bodyGradShade)"/>

  <!-- Glowing magic book -->
  <g transform="translate(135 200) rotate(8)">
    <circle cx="0" cy="0" r="32" fill="url(#glow)"/>
    <rect x="-18" y="-22" width="36" height="28" rx="3" fill="url(#bookGrad)" stroke="#92400E" stroke-width="1.5"/>
    <rect x="-15" y="-19" width="30" height="22" rx="1" fill="#FFFBEB"/>
    <line x1="-10" y1="-12" x2="10" y2="-12" stroke="#92400E" stroke-width="1"/>
    <line x1="-10" y1="-7" x2="10" y2="-7" stroke="#92400E" stroke-width="1"/>
    <line x1="-10" y1="-2" x2="5" y2="-2" stroke="#92400E" stroke-width="1"/>
    <!-- Sparkles -->
    <g fill="#FBBF24">
      <circle cx="-22" cy="-26" r="2"/>
      <circle cx="20" cy="-28" r="1.5"/>
      <circle cx="22" cy="6" r="1.8"/>
    </g>
  </g>

  <!-- Face plate (heart shape) -->
  <path d="M 120 70 C 90 60 65 78 65 110 C 65 140 95 165 120 175 C 145 165 175 140 175 110 C 175 78 150 60 120 70 Z" fill="url(#faceGrad)" filter="url(#softShadow)"/>

  <!-- Subtle face plate outline -->
  <path d="M 120 70 C 90 60 65 78 65 110 C 65 140 95 165 120 175 C 145 165 175 140 175 110 C 175 78 150 60 120 70 Z" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity="0.4"/>

  <!-- Ear tufts (small triangular) -->
  <path d="M 72 65 L 65 35 L 90 55 Z" fill="url(#bodyGrad)"/>
  <path d="M 72 65 L 65 35 L 90 55 Z" fill="url(#bodyGradShade)"/>
  <path d="M 168 65 L 175 35 L 150 55 Z" fill="url(#bodyGrad)"/>
  <path d="M 168 65 L 175 35 L 150 55 Z" fill="url(#bodyGradShade)"/>

  <!-- Inner ear tuft highlights -->
  <path d="M 76 58 L 72 45 L 84 53 Z" fill="#FBBF24" opacity="0.4"/>
  <path d="M 164 58 L 168 45 L 156 53 Z" fill="#FBBF24" opacity="0.4"/>

  <!-- Cheek blush -->
  <ellipse cx="82" cy="125" rx="12" ry="8" fill="url(#cheekGrad)"/>
  <ellipse cx="158" cy="125" rx="12" ry="8" fill="url(#cheekGrad)"/>

  <!-- Eyes (big circles) -->
  <circle cx="95" cy="110" r="22" fill="#1F2937"/>
  <circle cx="145" cy="110" r="22" fill="#1F2937"/>
  <!-- Iris (subtle dark purple) -->
  <circle cx="95" cy="110" r="20" fill="#1F2937"/>
  <circle cx="145" cy="110" r="20" fill="#1F2937"/>
  <!-- Big shine -->
  <circle cx="100" cy="103" r="7" fill="white"/>
  <circle cx="150" cy="103" r="7" fill="white"/>
  <!-- Small shine -->
  <circle cx="90" cy="115" r="3" fill="white" opacity="0.85"/>
  <circle cx="140" cy="115" r="3" fill="white" opacity="0.85"/>
  <!-- Tiny gleam -->
  <circle cx="103" cy="100" r="1.5" fill="white"/>
  <circle cx="153" cy="100" r="1.5" fill="white"/>

  <!-- Eye brows (curious arch) -->
  <path d="M 80 80 Q 95 73 110 82" stroke="#5B21B6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 130 82 Q 145 73 160 80" stroke="#5B21B6" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Beak (small triangle) -->
  <path d="M 120 130 L 113 142 Q 120 148 127 142 Z" fill="url(#beakGrad)"/>
  <path d="M 120 130 L 113 142 Q 120 148 127 142 Z" fill="none" stroke="#92400E" stroke-width="0.8" opacity="0.7"/>

  <!-- Small smile under beak (very subtle) -->
  <path d="M 113 148 Q 120 152 127 148" stroke="#92400E" stroke-width="1.3" fill="none" opacity="0.55" stroke-linecap="round"/>

  <!-- Tiny stars/sparkles around character -->
  <g fill="#FBBF24" opacity="0.85">
    <path d="M 30 80 L 32 86 L 38 88 L 32 90 L 30 96 L 28 90 L 22 88 L 28 86 Z"/>
    <path d="M 205 100 L 207 105 L 212 107 L 207 109 L 205 114 L 203 109 L 198 107 L 203 105 Z" opacity="0.7"/>
    <circle cx="40" cy="45" r="2"/>
    <circle cx="200" cy="55" r="2.5"/>
    <circle cx="215" cy="170" r="2"/>
    <circle cx="22" cy="140" r="1.8"/>
  </g>
</svg>
