  <!-- Towers -->
  <rect x="18" y="36" width="10" height="30" fill="url(#castle)" stroke="#4338CA" stroke-width="1.5"/>
  <rect x="52" y="36" width="10" height="30" fill="url(#castle)" stroke="#4338CA" stroke-width="1.5"/>
  <rect x="34" y="28" width="12" height="38" fill="url(#castle)" stroke="#4338CA" stroke-width="1.5"/>
