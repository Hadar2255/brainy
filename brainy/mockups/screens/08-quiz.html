<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz – מוחי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../assets/css/design-tokens.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    .lesson-progress {
      flex: 1;
      height: 12px;
      background: var(--color-border);
      border-radius: 6px;
      overflow: hidden;
    }
    .lesson-progress .fill {
      height: 100%;
      width: 50%;
      background: linear-gradient(180deg, var(--color-success) 0%, var(--color-success-dark) 100%);
      border-radius: 6px;
    }
    .quiz-question {
      padding: 8px 4px 16px;
    }
    .quiz-question h2 {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.3;
    }
  </style>
</head>
<body class="has-frame">
  <div class="mobile-frame">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">📶 🔋</span>
    </div>
    <div class="app-header">
      <div class="header-left">
        <button class="btn-icon" data-nav="home">✕</button>
      </div>
      <div style="flex:1; padding: 0 8px; display: flex; align-items: center; gap: 8px;">
        <div class="lesson-progress"><div class="fill"></div></div>
        <span class="heart-icon" style="padding: 2px 8px;"><span class="heart-symbol">❤</span> 5</span>
      </div>
      <div class="header-right">
        <div class="language-switch">
          <button data-lang="he" class="active">עב</button>
          <button data-lang="en">EN</button>
        </div>
      </div>
    </div>

    <div class="page page-padded stack-4" data-component="multiple-choice">
      <div class="quiz-question animate-fade-in">
        <h2 data-i18n="quiz.question">מה משמעות האות M הראשונה ב-MOM?</h2>
      </div>

      <div class="stack-3">
        <button class="quiz-option animate-fade-in" data-correct="false">
          <span class="option-key">1</span>
          <span data-i18n="quiz.option_a">Memory (זיכרון)</span>
        </button>
        <button class="quiz-option animate-fade-in-delay-1" data-correct="true">
          <span class="option-key">2</span>
          <span data-i18n="quiz.option_b">Motivation (מוטיבציה)</span>
        </button>
        <button class="quiz-option animate-fade-in-delay-2" data-correct="false">
          <span class="option-key">3</span>
          <span data-i18n="quiz.option_c">Method (שיטה)</span>
        </button>
        <button class="quiz-option animate-fade-in-delay-3" data-correct="false">
          <span class="option-key">4</span>
          <span data-i18n="quiz.option_d">Mind (תודעה)</span>
        </button>
      </div>

      <div class="feedback-banner" data-feedback style="display:none;">
        <span class="feedback-icon">✓</span>
        <span class="feedback-text" data-i18n="feedback.correct">מצוין! תשובה נכונה</span>
      </div>
    </div>

    <div class="footer-actions">
      <button class="btn btn-primary btn-block btn-lg" data-action="check" data-i18n="common.check" disabled>בדוק</button>
    </div>
  </div>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/navigation.js"></script>
  <script src="../assets/js/interactions.js"></script>
</body>
</html>
