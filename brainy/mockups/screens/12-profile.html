<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – מוחי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../assets/css/design-tokens.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    .profile-header {
      background:
        radial-gradient(at 25% 25%, rgba(252, 211, 77, 0.35) 0px, transparent 50%),
        radial-gradient(at 75% 75%, rgba(236, 72, 153, 0.3) 0px, transparent 50%),
        linear-gradient(135deg, #A78BFA 0%, #7C3AED 50%, #5B21B6 100%);
      padding: 32px 24px 24px;
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .profile-header::before {
      content: '';
      position: absolute;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
      top: -100px;
      inset-inline-start: -80px;
    }
    .profile-avatar-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 14px;
      z-index: 2;
    }
    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
      border: 5px solid white;
      overflow: hidden;
    }
    .profile-avatar img {
      width: 110%;
      height: 110%;
      object-fit: contain;
      margin-top: 8px;
    }
    .level-badge {
      position: absolute;
      bottom: -2px;
      inset-inline-end: -6px;
      background: var(--gradient-secondary);
      color: #78350F;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 900;
      border: 3px solid white;
      box-shadow: var(--shadow-amber);
    }
    .profile-name {
      font-size: 26px;
      font-weight: 900;
      position: relative;
      z-index: 2;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .profile-joined {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 2px;
      position: relative;
      z-index: 2;
      font-weight: 600;
    }
    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }
    .stat-glass {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 16px;
      padding: 12px 6px;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .stat-glass .value {
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .stat-glass .label {
      font-size: 10px;
      opacity: 0.9;
      margin-top: 4px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .achievements-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-header h3 {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.01em;
    }
    .view-all {
      font-size: 12px;
      color: var(--color-primary);
      font-weight: 800;
      text-decoration: none;
      background: #F5F3FF;
      padding: 4px 10px;
      border-radius: 9999px;
    }
  </style>
</head>
<body class="has-frame">
  <div class="mobile-frame">
    <div class="notch"></div>
    <div class="status-bar" style="color: white;">
      <span class="time">9:41</span>
      <span class="icons">📶 🔋</span>
    </div>

    <div class="profile-header">
      <div style="position: absolute; top: 50px; inset-inline-end: 16px; z-index: 3;">
        <div class="language-switch" style="background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.3); backdrop-filter: blur(12px);">
          <button data-lang="he" class="active">עב</button>
          <button data-lang="en">EN</button>
        </div>
      </div>
      <div class="profile-avatar-wrap">
        <div class="profile-avatar">
          <img src="../assets/img/mascot.svg" alt="">
        </div>
        <div class="level-badge" data-i18n="profile.level">רמה 3</div>
      </div>
      <div class="profile-name" data-i18n="profile.name">הדר</div>
      <div class="profile-joined" data-i18n="profile.joined">הצטרף במאי 2026</div>

      <div class="stat-row">
        <div class="stat-glass">
          <div class="value">🔥 7</div>
          <div class="label">streak</div>
        </div>
        <div class="stat-glass">
          <div class="value">⚡ 240</div>
          <div class="label">XP</div>
        </div>
        <div class="stat-glass">
          <div class="value">📚 12</div>
          <div class="label">שיעורים</div>
        </div>
      </div>
    </div>

    <div class="page page-padded stack-5" style="padding-top: 20px;">
      <button class="btn btn-outline btn-block" data-i18n="profile.edit_profile">ערוך פרופיל</button>

      <div>
        <div class="section-header">
          <h3 data-i18n="profile.achievements">הישגים</h3>
          <a class="view-all" href="#" data-i18n="profile.view_all">ראה הכל</a>
        </div>
        <div class="achievements-grid">
          <div class="achievement unlocked">
            <div class="achievement-icon">🥇</div>
            <div class="achievement-name" data-i18n="achievements.first_lesson">השיעור הראשון</div>
          </div>
          <div class="achievement unlocked">
            <div class="achievement-icon">🔥</div>
            <div class="achievement-name" data-i18n="achievements.week_streak">רצף שבוע</div>
          </div>
          <div class="achievement unlocked">
            <div class="achievement-icon">🎯</div>
            <div class="achievement-name" data-i18n="achievements.perfect_quiz">טוסט מושלם</div>
          </div>
          <div class="achievement locked">
            <div class="achievement-icon">🌅</div>
            <div class="achievement-name" data-i18n="achievements.early_bird">ציפור בוקר</div>
          </div>
          <div class="achievement locked">
            <div class="achievement-icon">🌙</div>
            <div class="achievement-name" data-i18n="achievements.night_owl">ינשוף לילה</div>
          </div>
          <div class="achievement locked">
            <div class="achievement-icon">👑</div>
            <div class="achievement-name" data-i18n="achievements.month_streak">רצף חודש</div>
          </div>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <button class="nav-item" data-nav-to="05-home.html">
        <div class="nav-icon-wrap"><span class="nav-icon">🏠</span></div>
        <span data-i18n="nav.learn">למידה</span>
      </button>
      <button class="nav-item" data-nav-to="13-progress.html">
        <div class="nav-icon-wrap"><span class="nav-icon">📊</span></div>
        <span data-i18n="nav.progress">התקדמות</span>
      </button>
      <button class="nav-item active">
        <div class="nav-icon-wrap"><span class="nav-icon">👤</span></div>
        <span data-i18n="nav.profile">פרופיל</span>
      </button>
      <button class="nav-item" data-nav-to="14-settings.html">
        <div class="nav-icon-wrap"><span class="nav-icon">⚙️</span></div>
        <span data-i18n="nav.settings">הגדרות</span>
      </button>
    </nav>
  </div>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/navigation.js"></script>
</body>
</html>
