<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Goal – מוחי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../assets/css/design-tokens.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    .goal-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
    }
    .goal-icon {
      font-size: 28px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--color-surface-alt);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .goal-card.selected .goal-icon {
      background: var(--color-primary);
    }
    .goal-name {
      font-size: 16px;
      font-weight: 800;
    }
    .goal-time {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }
    .progress-step {
      width: 100%;
      height: 8px;
      background: var(--color-border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-step .fill {
      height: 100%;
      background: var(--color-primary);
      width: 50%;
      border-radius: 4px;
    }
  </style>
</head>
<body class="has-frame">
  <div class="mobile-frame">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">📶 🔋</span>
    </div>
    <div class="app-header">
      <div class="header-left">
        <button class="btn-icon" data-nav="prev">‹</button>
      </div>
      <div style="flex:1; padding: 0 12px;">
        <div class="progress-step"><div class="fill"></div></div>
      </div>
      <div class="header-right">
        <div class="language-switch">
          <button data-lang="he" class="active">עב</button>
          <button data-lang="en">EN</button>
        </div>
      </div>
    </div>
    <div class="page page-padded stack-5" data-component="card-select">
      <div class="text-center stack-2">
        <h1 class="h2" data-i18n="signup.title">מה היעד היומי שלך?</h1>
        <p class="body-text text-muted" data-i18n="signup.subtitle">תאמן את המוח 5 דקות ביום זה משנה את החיים</p>
      </div>
      <div class="stack-3">
        <div class="card card-selectable goal-card" data-select-group="goal">
          <div class="goal-icon">☕</div>
          <div>
            <div class="goal-name" data-i18n="signup.goal_casual">רגוע</div>
            <div class="goal-time" data-i18n="signup.goal_casual_time">3 דקות / יום</div>
          </div>
        </div>
        <div class="card card-selectable goal-card selected" data-select-group="goal">
          <div class="goal-icon">🎯</div>
          <div>
            <div class="goal-name" data-i18n="signup.goal_regular">רגיל</div>
            <div class="goal-time" data-i18n="signup.goal_regular_time">5 דקות / יום</div>
          </div>
        </div>
        <div class="card card-selectable goal-card" data-select-group="goal">
          <div class="goal-icon">🚀</div>
          <div>
            <div class="goal-name" data-i18n="signup.goal_serious">רציני</div>
            <div class="goal-time" data-i18n="signup.goal_serious_time">10 דקות / יום</div>
          </div>
        </div>
        <div class="card card-selectable goal-card" data-select-group="goal">
          <div class="goal-icon">🔥</div>
          <div>
            <div class="goal-name" data-i18n="signup.goal_intense">אינטנסיבי</div>
            <div class="goal-time" data-i18n="signup.goal_intense_time">15 דקות / יום</div>
          </div>
        </div>
      </div>
    </div>
    <div class="footer-actions">
      <button class="btn btn-primary btn-block btn-lg" data-action="continue-after-select" data-nav="next" data-i18n="common.continue">המשך</button>
    </div>
  </div>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/navigation.js"></script>
  <script src="../assets/js/interactions.js"></script>
</body>
</html>
