<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match – מוחי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../assets/css/design-tokens.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    .lesson-progress {
      flex: 1;
      height: 12px;
      background: var(--color-border);
      border-radius: 6px;
      overflow: hidden;
    }
    .lesson-progress .fill {
      height: 100%;
      width: 75%;
      background: linear-gradient(180deg, var(--color-success) 0%, var(--color-success-dark) 100%);
      border-radius: 6px;
    }
    .match-item .pair-letter {
      font-size: 32px;
      font-weight: 900;
      font-family: var(--font-family-en);
      color: var(--color-primary);
    }
  </style>
</head>
<body class="has-frame">
  <div class="mobile-frame">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">📶 🔋</span>
    </div>
    <div class="app-header">
      <div class="header-left">
        <button class="btn-icon" data-nav="home">✕</button>
      </div>
      <div style="flex:1; padding: 0 8px; display: flex; align-items: center; gap: 8px;">
        <div class="lesson-progress"><div class="fill"></div></div>
        <span class="heart-icon" style="padding: 2px 8px;"><span class="heart-symbol">❤</span> 5</span>
      </div>
      <div class="header-right">
        <div class="language-switch">
          <button data-lang="he" class="active">עב</button>
          <button data-lang="en">EN</button>
        </div>
      </div>
    </div>

    <div class="page page-padded stack-4" data-component="match">
      <div class="text-center stack-1">
        <h2 class="h3" data-i18n="quiz_match.title">התאם בין האות למשמעות</h2>
        <p class="small text-muted" data-i18n="quiz_match.subtitle">לחץ על אות ואז על המשמעות המתאימה</p>
      </div>

      <div class="match-grid">
        <button class="match-item animate-fade-in" data-pair="motivation">
          <span class="pair-letter">M¹</span>
          <div class="small" style="margin-top:4px;" data-i18n="lesson_teach.mom_m1">מוטיבציה</div>
        </button>
        <button class="match-item animate-fade-in" data-pair="observation">
          <div data-i18n="lesson_teach.mom_o_desc">שים לב</div>
        </button>

        <button class="match-item animate-fade-in-delay-1" data-pair="observation">
          <span class="pair-letter">O</span>
          <div class="small" style="margin-top:4px;" data-i18n="lesson_teach.mom_o">תצפית</div>
        </button>
        <button class="match-item animate-fade-in-delay-1" data-pair="mechanism">
          <div data-i18n="lesson_teach.mom_m2_desc">השתמש בשיטה</div>
        </button>

        <button class="match-item animate-fade-in-delay-2" data-pair="mechanism">
          <span class="pair-letter">M²</span>
          <div class="small" style="margin-top:4px;" data-i18n="lesson_teach.mom_m2">מכניזם</div>
        </button>
        <button class="match-item animate-fade-in-delay-2" data-pair="motivation">
          <div data-i18n="lesson_teach.mom_m1_desc">תרצה לזכור</div>
        </button>

        <button class="match-item animate-fade-in-delay-3" data-pair="palace">
          <span class="pair-letter">PIE</span>
          <div class="small" style="margin-top:4px;" data-i18n="quiz_match.p_meaning">ארמון הזיכרון</div>
        </button>
        <button class="match-item animate-fade-in-delay-3" data-pair="palace">
          <div>🏰</div>
        </button>
      </div>
    </div>

    <div class="footer-actions">
      <button class="btn btn-success btn-block btn-lg" data-action="match-done" data-nav="next" data-i18n="common.continue" disabled>המשך</button>
    </div>
  </div>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/navigation.js"></script>
  <script src="../assets/js/interactions.js"></script>
</body>
</html>
