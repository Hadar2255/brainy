<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splash – מוחי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../assets/css/design-tokens.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    .splash-bg {
      background:
        radial-gradient(at 20% 20%, rgba(252, 211, 77, 0.4) 0px, transparent 50%),
        radial-gradient(at 80% 80%, rgba(236, 72, 153, 0.3) 0px, transparent 50%),
        linear-gradient(135deg, #6366F1 0%, #8B5CF6 35%, #A855F7 70%, #EC4899 100%);
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      color: white;
      position: relative;
      overflow: hidden;
      padding: 0 32px;
    }
    .splash-bg::before, .splash-bg::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
    }
    .splash-bg::before {
      width: 320px; height: 320px;
      top: -120px; inset-inline-end: -100px;
      background: rgba(255, 255, 255, 0.12);
    }
    .splash-bg::after {
      width: 260px; height: 260px;
      bottom: -80px; inset-inline-start: -80px;
      background: rgba(252, 211, 77, 0.2);
    }
    .splash-floating {
      position: absolute;
      font-size: 24px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
      opacity: 0.6;
    }
    .float-1 { top: 14%; left: 12%; animation: float 4s ease-in-out infinite; }
    .float-2 { top: 22%; right: 14%; animation: float 5s ease-in-out infinite 0.5s; }
    .float-3 { bottom: 22%; left: 14%; animation: float 4.5s ease-in-out infinite 1s; }
    .float-4 { bottom: 30%; right: 10%; animation: float 5.5s ease-in-out infinite 1.5s; }

    .splash-logo {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: -2px;
      position: relative;
      z-index: 2;
      text-shadow: 0 4px 24px rgba(0,0,0,0.25);
    }
    .splash-tagline {
      font-size: 18px;
      opacity: 0.95;
      font-weight: 700;
      text-align: center;
      max-width: 280px;
      position: relative;
      z-index: 2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .splash-mascot {
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 16px 40px rgba(0, 0, 0, 0.3));
    }
    .splash-mascot img {
      width: 220px;
      height: 256px;
    }
    .loading-dots {
      display: flex;
      gap: 10px;
      position: absolute;
      bottom: 96px;
      z-index: 2;
    }
    .loading-dots span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      animation: loadingPulse 1.4s ease-in-out infinite;
      box-shadow: 0 0 16px rgba(255,255,255,0.4);
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes loadingPulse {
      0%, 60%, 100% { opacity: 0.35; transform: scale(0.85); }
      30% { opacity: 1; transform: scale(1.3); }
    }
    .skip-btn {
      position: absolute;
      bottom: 28px;
      inset-inline-end: 28px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 18px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      backdrop-filter: blur(12px);
      z-index: 3;
      font-family: inherit;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body class="has-frame">
  <div class="mobile-frame">
    <div class="notch"></div>
    <div class="status-bar" style="color: white;">
      <span class="time">9:41</span>
      <span class="icons">📶 🔋</span>
    </div>
    <div class="splash-bg">
      <span class="splash-floating float-1">✨</span>
      <span class="splash-floating float-2">📚</span>
      <span class="splash-floating float-3">🌟</span>
      <span class="splash-floating float-4">💫</span>

      <div class="splash-mascot animate-float">
        <img src="../assets/img/mascot.svg" alt="Hoot mascot">
      </div>
      <div class="splash-logo animate-bounce-once" data-i18n="app.name">מוחי</div>
      <div class="splash-tagline animate-fade-in-delay-2" data-i18n="app.tagline">אמן את הזיכרון שלך – 5 דקות ביום</div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
      <button class="skip-btn" data-nav="next" data-i18n="common.skip">דלג</button>
    </div>
  </div>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/navigation.js"></script>
  <script>
    setTimeout(() => { window.nav && window.nav.next(); }, 6000);
  </script>
</body>
</html>
